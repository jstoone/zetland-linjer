<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Linjer</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --text: #e2e2e2;
        --text-white: #fff;
        --surface: rgba(22, 33, 62, 0.85);
        --surface-active: rgba(15, 52, 96, 0.95);
        --surface-border: #0f3460;
        --accent: rgba(83, 194, 139, 0.9);
        --accent-active: rgba(63, 164, 109, 0.95);
        --error: rgba(233, 69, 96, 0.9);
        --font: system-ui, -apple-system, sans-serif;
        --radius: 24px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
      canvas { display: block; touch-action: none; }

      /* Shared button base */
      .btn {
        position: fixed;
        font-family: var(--font);
        font-weight: 600;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        z-index: 10;
        -webkit-tap-highlight-color: transparent;
        display: none;
        transition: background 0.15s ease, opacity 0.15s ease;
      }
      .btn:disabled { opacity: 0.5; cursor: default; }

      #reset-btn {
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 28px;
        font-size: 15px;
        color: var(--text);
        background: var(--surface);
        border: 1.5px solid var(--surface-border);
      }
      #reset-btn:active { background: var(--surface-active); }

      #undo-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 24px;
        font-size: 14px;
        font-family: var(--font);
        color: var(--text);
        background: var(--accent);
        border-radius: 20px;
        cursor: pointer;
        z-index: 10;
        display: none;
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.15s ease;
      }

      #submit-btn {
        bottom: 24px;
        right: 24px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-white);
        background: var(--accent);
      }
      #submit-btn:active { background: var(--accent-active); }

      #results-btn {
        bottom: 24px;
        right: 24px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-white);
        background: var(--surface-active);
      }
      #results-btn:active { background: rgba(22, 66, 120, 0.95); }

      #instruction {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        text-align: center;
        padding: 10px 16px;
        font-family: var(--font);
        font-size: 14px;
        color: var(--text);
        background: linear-gradient(to bottom, var(--bg) 60%, transparent);
        z-index: 10;
        pointer-events: none;
      }

      #submit-error {
        position: fixed;
        bottom: 80px;
        right: 24px;
        padding: 10px 20px;
        font-size: 13px;
        font-family: var(--font);
        color: var(--text-white);
        background: var(--error);
        border-radius: 16px;
        z-index: 10;
        display: none;
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.15s ease;
      }
    </style>
  </head>
  <body>
    <div id="instruction">Tegn linjer mellem begivenhederne — hvad har ført til hvad?</div>
    <button id="reset-btn" class="btn">Nulstil</button>
    <div id="undo-toast">Fortryd</div>
    <button id="submit-btn" class="btn">Send</button>
    <button id="results-btn" class="btn">Se resultater</button>
    <div id="submit-error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
