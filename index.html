<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Linjer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
      canvas { display: block; touch-action: none; }
      #reset-btn {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 28px;
        font-size: 15px;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 600;
        color: #e2e2e2;
        background: rgba(22, 33, 62, 0.85);
        border: 1.5px solid #0f3460;
        border-radius: 24px;
        cursor: pointer;
        z-index: 10;
        -webkit-tap-highlight-color: transparent;
        display: none;
      }
      #reset-btn:active { background: rgba(15, 52, 96, 0.95); }
      #undo-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 24px;
        font-size: 14px;
        font-family: system-ui, -apple-system, sans-serif;
        color: #e2e2e2;
        background: rgba(83, 194, 139, 0.9);
        border-radius: 20px;
        cursor: pointer;
        z-index: 10;
        display: none;
        -webkit-tap-highlight-color: transparent;
      }
      #submit-btn {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 32px;
        font-size: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
        color: #fff;
        background: rgba(83, 194, 139, 0.9);
        border: none;
        border-radius: 24px;
        cursor: pointer;
        z-index: 10;
        -webkit-tap-highlight-color: transparent;
        display: none;
      }
      #submit-btn:active { background: rgba(63, 164, 109, 0.95); }
      #submit-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #submit-error {
        position: fixed;
        bottom: 80px;
        right: 24px;
        padding: 10px 20px;
        font-size: 13px;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(233, 69, 96, 0.9);
        border-radius: 16px;
        z-index: 10;
        display: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <button id="reset-btn">Nulstil</button>
    <div id="undo-toast">Fortryd</div>
    <button id="submit-btn">Send</button>
    <div id="submit-error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
