<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linjer — Admin</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.4s ease;
      }

      body.is-active { background: #22c55e; }
      body.is-inactive { background: #ef4444; }
      body.is-loading { background: #888; }

      .toggle-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .toggle-label {
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }

      /* Big toggle switch */
      .toggle {
        position: relative;
        width: 160px;
        height: 80px;
        background: rgba(0,0,0,0.25);
        border-radius: 40px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.3s ease;
      }

      .toggle .knob {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 68px;
        height: 68px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        transition: transform 0.3s ease;
      }

      .toggle.is-on .knob {
        transform: translateX(80px);
      }
    </style>
  </head>
  <body class="is-loading">
    <div class="toggle-wrap">
      <div class="toggle-label" id="label">Henter...</div>
      <div class="toggle" id="toggle">
        <div class="knob"></div>
      </div>
    </div>
    <script type="module">
      import { supabase } from "/src/supabase.ts";

      const toggle = document.getElementById("toggle");
      const label = document.getElementById("label");
      let active = false;
      let busy = false;

      async function fetchState() {
        const { data, error } = await supabase
          .from("settings")
          .select("results_active")
          .single();
        if (error) {
          label.textContent = "Fejl ved hentning";
          return;
        }
        active = data.results_active;
        render();
      }

      function render() {
        document.body.className = active ? "is-active" : "is-inactive";
        toggle.classList.toggle("is-on", active);
        label.textContent = active ? "Resultater aktive" : "Resultater deaktiveret";
      }

      toggle.addEventListener("click", async () => {
        if (busy) return;
        busy = true;

        const newValue = !active;
        const { error } = await supabase
          .from("settings")
          .update({ results_active: newValue })
          .eq("id", true);

        if (!error) {
          active = newValue;
          render();
        }
        busy = false;
      });

      fetchState();
    </script>
  </body>
</html>
